server {
    listen 80;
    
    server_name snaptuki.com www.snaptuki.com;
    return 301 https://$host$request_uri;
}

# Secure HTTPS Server
server{
    listen 443 ssl;
    server_name snaptuki.com www.snaptuki.com;

    # Point to hte Let's Encrypt certificates we will mount in via Docker
    ssl_certificate /etc/letsencrypt/live/snaptuki.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/snaptuki.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /graphql {
        proxy_pass http://api:4000/graphql;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}